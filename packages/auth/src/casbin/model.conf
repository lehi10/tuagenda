# Request definition
# sub = subject (user ID), dom = domain (business ID), obj = object (resource), act = action
[request_definition]
r = sub, dom, obj, act

# Policy definition
# p = policy rule: sub (role), dom (business ID), obj (resource), act (action)
[policy_definition]
p = sub, dom, obj, act

# Role definition
# g = role inheritance: user ID, role, domain (business ID)
# g2 = user type inheritance: user ID, user type (superadmin, admin, customer)
[role_definition]
g = _, _, _
g2 = _, _

# Policy effect
# Allow if there is a matching allow policy
[policy_effect]
e = some(where (p.eft == allow))

# Matchers
# Priority:
# 1. If user is superadmin (g2), allow everything
# 2. Else, check if user has a role in the domain that has permission
[matchers]
m = g2(r.sub, 'superadmin') || (g(r.sub, p.sub, r.dom) && r.dom == p.dom && r.obj == p.obj && r.act == p.act)
